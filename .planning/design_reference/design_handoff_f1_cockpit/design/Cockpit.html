<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>F1 Pit-Wall Cockpit · LEC · Bahrain</title>
  <meta name="viewport" content="width=1600"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;

      /* Mercedes/Red Bull engineering blacks */
      --bg: #05070b;
      --panel: #0a0e15;
      --panel-bg: #070a11;
      --panel-header: #0c1119;
      --panel-header-hi: #111827;

      --rule: #1a2130;
      --rule-strong: #2a3445;

      --text: #e8eef7;
      --text-dim: #6a7788;
      --text-muted: #46525f;

      --accent: #00E5FF;
      --accent-dim: #0092a8;

      --hot: #FF3344;
      --warn: #FFB020;
      --ok: #22E27A;
      --purple: #A855F7;

      --ferrari: #DC0000;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
    body { font-feature-settings: "tnum" 1, "ss01" 1; overflow-x: auto; }
    #root { min-height: 100vh; width: 100%; min-width: 1600px; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--panel-bg); }
    ::-webkit-scrollbar-thumb { background: var(--rule-strong); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    button { font-family: var(--mono); cursor: pointer; }
    button:focus { outline: 1px solid var(--accent); outline-offset: 1px; }

    @keyframes pulse-dot { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,255,0.55); } 50% { opacity: 0.85; box-shadow: 0 0 0 6px rgba(0,229,255,0); } }
    @keyframes blink-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="cockpit-car.jsx"></script>
  <script type="text/babel" src="cockpit-lap.jsx"></script>
  <script type="text/babel" src="cockpit-map.jsx"></script>
  <script type="text/babel" src="cockpit-physics.jsx"></script>
  <script type="text/babel" src="cockpit-app.jsx"></script>
</body>
</html>
