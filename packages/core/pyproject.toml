[project]
name = "f1-core"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastf1==3.8.2",
    "numpy>=2.1,<3",
    "scipy>=1.17,<2",
    "pandas>=2.2,<3",
    "pyyaml>=6",
    "typer>=0.24,<1",
]

[project.scripts]
f1-simulate = "f1_core.physics.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/f1_core"]
