[project]
name = "f1-api"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "f1-core",
    "f1-calibration",
    "fastapi>=0.136,<0.200",
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.6,<3",
    "arviz>=0.20,<1",
    "netcdf4>=1.7",
]

[project.optional-dependencies]
test = [
    "arviz>=0.20,<1",
    "netcdf4>=1.7",
    "pytest>=8",
    "pytest-benchmark>=4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/f1_api"]

[tool.uv.sources]
f1-core = { workspace = true }
f1-calibration = { workspace = true }
